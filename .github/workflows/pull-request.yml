name: pull-request

on:
  pull_request:

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  dependencies:
    name: Dependencies Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OSV Scanner (after PR)
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5
        with:
          scan-args: |-
            --format sarif
            --output after.sarif
            ./
        continue-on-error: true

      - name: Checkout baseline commit
        run: git checkout ${{ github.event.pull_request.base.sha }}

      - name: Run OSV Scanner (before PR)
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5
        with:
          scan-args: |-
            --format sarif
            --output before.sarif
            ./
        continue-on-error: true

      - name: Compare analysis
        uses: google/osv-scanner-action/osv-reporter-action@c51854704019a247608d928f370c98740469d4b5
        with:
          scan-args: |-
            --new before.sarif
            --old after.sarif
            --output DependenciesDiff.sarif
        continue-on-error: true

      - name: Save differential report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: DependenciesDiff
          path: DependenciesDiff.sarif

  source-code-analysis:
    name: Source Code Analysis
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep@sha256:7810f1d7884974ab6dda7bef8f4a2c8e165ea2142fd8260515d380e4f1407263
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep differential
        run: |
          semgrep scan \
            --config .semgrep \
            --sarif \
            --output SourceCodeAnalysis.sarif \
            --baseline-commit ${{ github.event.pull_request.base.sha }} || \
          echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"semgrep","rules":[]}},"results":[]}]}' > SourceCodeAnalysis.sarif
        continue-on-error: true

      - name: Save differential report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SourceCodeAnalysis
          path: SourceCodeAnalysis.sarif
